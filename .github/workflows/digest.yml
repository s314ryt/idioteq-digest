name: IDIOTEQ hourly digest
on:
  schedule:
    - cron: "*/30 * * * *"   # co 30 min (UTC); GitHub moze opoznic - stan gwarantuje szczelnosc
  workflow_dispatch: {}       # reczne odpalenie z panelu Actions
permissions:
  contents: write             # do commitowania seen.json
concurrency:
  group: digest
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run digest
        env:
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          MAIL_TO:   ${{ secrets.MAIL_TO }}
        run: python digest.py
      - name: Commit state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add seen.json || true
          git commit -m "update seen state [skip ci]" || { echo "brak zmian"; exit 0; }
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "push odrzucony ($i) — rebase na zdalne i ponawiam"
            git pull --rebase -X ours origin main || git rebase --abort || true
            sleep 3
          done
          echo "BLAD: nie zapisano stanu po 5 probach"; exit 1
